apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gyre.fullname" . }}
  labels:
    {{- include "gyre.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate  # Required for PVC with ReadWriteOnce
  selector:
    matchLabels:
      {{- include "gyre.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "gyre.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- if and (not .Values.encryption.existingSecret) (not (and .Values.encryption.allowInline (and .Values.encryption.gyreKey .Values.encryption.authKey))) }}
      {{- fail "Encryption keys are required. Set encryption.existingSecret (recommended) or set encryption.allowInline=true with non-empty gyreKey and authKey." }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "gyre.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
      hostNetwork: {{ .Values.hostNetwork }}
      hostPID: {{ .Values.hostPID }}
      hostIPC: {{ .Values.hostIPC }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: {{ .Chart.Name }}
        securityContext:
          {{- toYaml .Values.securityContext | nindent 12 }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.service.targetPort }}
          protocol: TCP
        livenessProbe:
          {{- toYaml .Values.livenessProbe | nindent 12 }}
        readinessProbe:
          {{- toYaml .Values.readinessProbe | nindent 12 }}
        resources:
          {{- toYaml .Values.resources | nindent 12 }}
        volumeMounts:
        - name: data
          mountPath: /data
        {{- if .Values.securityContext.readOnlyRootFilesystem }}
        - name: tmp
          mountPath: /tmp
        - name: cache
          mountPath: /.cache
        {{- end }}
        env:
        - name: DATABASE_URL
          value: /data/gyre.db
        - name: NODE_ENV
          value: production
        {{- if .Values.config.create }}
        - name: GYRE_POLL_INTERVAL_MS
          valueFrom:
            configMapKeyRef:
              name: {{ include "gyre.fullname" . }}-config
              key: GYRE_POLL_INTERVAL_MS
        - name: GYRE_HEARTBEAT_INTERVAL_MS
          valueFrom:
            configMapKeyRef:
              name: {{ include "gyre.fullname" . }}-config
              key: GYRE_HEARTBEAT_INTERVAL_MS
        - name: GYRE_DASHBOARD_CACHE_TTL_MS
          valueFrom:
            configMapKeyRef:
              name: {{ include "gyre.fullname" . }}-config
              key: GYRE_DASHBOARD_CACHE_TTL_MS
        - name: GYRE_SETTLING_PERIOD_MS
          valueFrom:
            configMapKeyRef:
              name: {{ include "gyre.fullname" . }}-config
              key: GYRE_SETTLING_PERIOD_MS
        {{- range $key, $value := .Values.config.additionalConfig }}
        - name: {{ $key }}
          valueFrom:
            configMapKeyRef:
              name: {{ include "gyre.fullname" . }}-config
              key: {{ $key }}
        {{- end }}
        {{- end }}
        {{- $originState := dict "value" (printf "http://%s.%s.svc.cluster.local" (include "gyre.fullname" .) .Release.Namespace) }}
        {{- if .Values.origin }}
        {{- $_ := set $originState "value" .Values.origin }}
        {{- else if and .Values.ingress.enabled (gt (len .Values.ingress.hosts) 0) }}
        {{- $host := (index .Values.ingress.hosts 0).host }}
        {{- $protocol := ternary "https" "http" (gt (len .Values.ingress.tls) 0) }}
        {{- $_ := set $originState "value" (printf "%s://%s" $protocol $host) }}
        {{- else if and .Values.gatewayApi.enabled (gt (len .Values.gatewayApi.hostnames) 0) }}
        {{- $host := index .Values.gatewayApi.hostnames 0 }}
        {{- $protocol := ternary "https" "http" .Values.gatewayApi.tls }}
        {{- $_ := set $originState "value" (printf "%s://%s" $protocol $host) }}
        {{- end }}
        - name: ORIGIN
          value: {{ get $originState "value" | quote }}
        - name: BETTER_AUTH_URL
          value: {{ get $originState "value" | quote }}
        {{- $encSecretName := .Values.encryption.existingSecret | default (printf "%s-encryption" (include "gyre.fullname" .)) }}
        {{- if or .Values.encryption.existingSecret (and .Values.encryption.allowInline .Values.encryption.gyreKey) }}
        - name: GYRE_ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: {{ $encSecretName }}
              key: GYRE_ENCRYPTION_KEY
        {{- end }}
        {{- if or .Values.encryption.existingSecret (and .Values.encryption.allowInline .Values.encryption.authKey) }}
        - name: AUTH_ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: {{ $encSecretName }}
              key: AUTH_ENCRYPTION_KEY
        {{- end }}
        # Authentication settings
        {{- if .Values.auth }}
        - name: GYRE_AUTH_LOCAL_LOGIN_ENABLED
          value: {{ .Values.auth.localLoginEnabled | toString | default "true" | quote }}
        - name: GYRE_AUTH_ALLOW_SIGNUP
          value: {{ .Values.auth.allowSignup | toString | default "false" | quote }}
        {{- if .Values.auth.domainAllowlist }}
        - name: GYRE_AUTH_DOMAIN_ALLOWLIST
          value: {{ .Values.auth.domainAllowlist | toJson | quote }}
        {{- end }}
        {{- if .Values.auth.providers }}
        - name: GYRE_AUTH_PROVIDERS
          value: {{ .Values.auth.providers | toJson | quote }}
        {{- end }}
        # Provider client secrets from existing secret
        {{- if .Values.auth.providersExistingSecret }}
        {{- range $provider := .Values.auth.providers }}
        {{- $providerKey := regexReplaceAll "[^A-Z0-9]" ($provider.name | upper) "_" }}
        - name: GYRE_AUTH_PROVIDER_{{ $providerKey }}_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ $.Values.auth.providersExistingSecret }}
              key: PROVIDER_{{ $providerKey }}_CLIENT_SECRET
              optional: true
        {{- end }}
        {{- end }}
        {{- end }}
      volumes:
      - name: data
        {{- if .Values.persistence.enabled }}
        persistentVolumeClaim:
          claimName: {{ .Values.persistence.existingClaim | default (printf "%s-data" (include "gyre.fullname" .)) }}
        {{- else }}
        emptyDir: {}
        {{- end }}
      {{- if .Values.securityContext.readOnlyRootFilesystem }}
      - name: tmp
        emptyDir: {}
      - name: cache
        emptyDir: {}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
