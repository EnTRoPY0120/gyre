{{- if .Values.admin.autoGenerate -}}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace .Values.admin.secretName -}}
{{- $password := randAlphaNum 24 -}}
{{- if and $existingSecret (hasKey $existingSecret.data "password") -}}
{{- $password = (index $existingSecret.data "password" | b64dec) -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.admin.secretName }}
  labels:
    {{- include "gyre.labels" . | nindent 4 }}
    app.kubernetes.io/component: auth
    gyre.io/secret-type: initial-admin-password
type: Opaque
stringData:
  password: {{ $password | quote }}
{{- end }}
