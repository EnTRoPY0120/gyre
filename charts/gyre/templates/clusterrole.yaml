{{- if and .Values.rbac.create .Values.rbac.clusterRole.create -}}
{{- $verbs := list "get" "list" "watch" }}
{{- if not .Values.rbac.clusterRole.readOnly }}
{{- $verbs = concat $verbs (list "create" "update" "patch" "delete") }}
{{- end }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "gyre.fullname" . }}
  labels:
    {{- include "gyre.labels" . | nindent 4 }}
rules:
# FluxCD Source Controller Resources
- apiGroups: ["source.toolkit.fluxcd.io"]
  resources:
    - gitrepositories
    - helmrepositories
    - helmcharts
    - buckets
    - ocirepositories
    - externalartifacts
  verbs: {{ $verbs | toJson }}

# FluxCD Source Controller Status
- apiGroups: ["source.toolkit.fluxcd.io"]
  resources:
    - gitrepositories/status
    - helmrepositories/status
    - helmcharts/status
    - buckets/status
    - ocirepositories/status
    - externalartifacts/status
  verbs: ["get", "list", "watch"]

# FluxCD Kustomize Controller Resources
- apiGroups: ["kustomize.toolkit.fluxcd.io"]
  resources:
    - kustomizations
  verbs: {{ $verbs | toJson }}

# FluxCD Kustomize Controller Status
- apiGroups: ["kustomize.toolkit.fluxcd.io"]
  resources:
    - kustomizations/status
  verbs: ["get", "list", "watch"]

# FluxCD Helm Controller Resources
- apiGroups: ["helm.toolkit.fluxcd.io"]
  resources:
    - helmreleases
  verbs: {{ $verbs | toJson }}

# FluxCD Helm Controller Status
- apiGroups: ["helm.toolkit.fluxcd.io"]
  resources:
    - helmreleases/status
  verbs: ["get", "list", "watch"]

# FluxCD Notification Controller Resources
- apiGroups: ["notification.toolkit.fluxcd.io"]
  resources:
    - alerts
    - providers
    - receivers
  verbs: {{ $verbs | toJson }}

# FluxCD Notification Controller Status
- apiGroups: ["notification.toolkit.fluxcd.io"]
  resources:
    - alerts/status
    - providers/status
    - receivers/status
  verbs: ["get", "list", "watch"]

# FluxCD Image Automation Controller Resources
- apiGroups: ["image.toolkit.fluxcd.io"]
  resources:
    - imagerepositories
    - imagepolicies
    - imageupdateautomations
  verbs: {{ $verbs | toJson }}

# FluxCD Image Automation Controller Status
- apiGroups: ["image.toolkit.fluxcd.io"]
  resources:
    - imagerepositories/status
    - imagepolicies/status
    - imageupdateautomations/status
  verbs: ["get", "list", "watch"]

# Core Kubernetes Resources (read-only)
- apiGroups: [""]
  resources:
    - namespaces
    - events
    - pods
    - pods/log
    - services
    - configmaps
  verbs: ["get", "list", "watch"]

# Apps Resources (read-only for deployments, etc.)
- apiGroups: ["apps"]
  resources:
    - deployments
    - statefulsets
    - daemonsets
    - replicasets
  verbs: ["get", "list", "watch"]

{{- with .Values.rbac.clusterRole.rules }}
# Additional custom rules
{{- toYaml . | nindent 0 }}
{{- end }}
{{- end }}
