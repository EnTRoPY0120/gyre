{{- if .Values.rbac.create -}}
{{- $generatedEncryptionSecretName := printf "%s-encryption" (include "gyre.fullname" .) -}}
{{- $secretNames := list .Values.admin.secretName $generatedEncryptionSecretName -}}
{{- if and .Values.encryption.existingSecret (ne .Values.encryption.existingSecret $generatedEncryptionSecretName) -}}
{{- $secretNames = append $secretNames .Values.encryption.existingSecret -}}
{{- end -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "gyre.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gyre.labels" . | nindent 4 }}
rules:
- apiGroups: [""]
  resources:
    - secrets
  verbs: ["create"]
- apiGroups: [""]
  resources:
    - secrets
  resourceNames:
    {{- range $secretName := uniq $secretNames }}
    - {{ $secretName }}
    {{- end }}
  verbs: ["get", "list", "watch", "update", "patch"]
{{- end }}
