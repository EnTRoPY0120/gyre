{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "gyre.fullname" . }}
  labels:
    {{- include "gyre.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "gyre.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow ingress from pods with matching labels (e.g., ingress controller)
    {{- if .Values.networkPolicy.ingress.podSelector }}
    - from:
      - podSelector:
          {{- toYaml .Values.networkPolicy.ingress.podSelector | nindent 10 }}
        {{- if .Values.networkPolicy.ingress.namespaceSelector }}
        namespaceSelector:
          {{- toYaml .Values.networkPolicy.ingress.namespaceSelector | nindent 10 }}
        {{- end }}
      ports:
      - protocol: TCP
        port: {{ .Values.service.targetPort }}
    {{- end }}
    {{- if .Values.networkPolicy.ingress.additionalRules }}
    {{- toYaml .Values.networkPolicy.ingress.additionalRules | nindent 4 }}
    {{- end }}
    {{- if and (not .Values.networkPolicy.ingress.podSelector) (not .Values.networkPolicy.ingress.additionalRules) }}
    # No ingress selectors configured: all ingress is denied by default.
    # Set networkPolicy.ingress.podSelector or networkPolicy.ingress.additionalRules
    # to allow traffic from specific sources.
    {{- end }}
  egress:
    # Allow DNS resolution
    - to:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: {{ .Values.networkPolicy.dnsNamespace }}
        podSelector:
          matchLabels:
            k8s-app: kube-dns
      ports:
      - protocol: UDP
        port: 53
      - protocol: TCP
        port: 53
    {{- $apiServer := .Values.networkPolicy.egress.apiServer }}
    {{- $apiServerHasTargets := or $apiServer.namespaceSelector $apiServer.podSelector (gt (len ($apiServer.ipBlocks | default (list))) 0) }}
    # Allow outbound traffic to the Kubernetes API server. Configure
    # networkPolicy.egress.apiServer for managed control plane IPs or selector-based targeting.
    # networkPolicy.apiServerNamespace remains as a deprecated fallback for older installs.
    - to:
      {{- if $apiServerHasTargets }}
      {{- if or $apiServer.namespaceSelector $apiServer.podSelector }}
      - {{- if $apiServer.namespaceSelector }}
        namespaceSelector:
          {{- toYaml $apiServer.namespaceSelector | nindent 10 }}
        {{- end }}
        {{- if $apiServer.podSelector }}
        podSelector:
          {{- toYaml $apiServer.podSelector | nindent 10 }}
        {{- end }}
      {{- end }}
      {{- range $cidr := $apiServer.ipBlocks }}
      - ipBlock:
          cidr: {{ $cidr | quote }}
      {{- end }}
      {{- else }}
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: {{ .Values.networkPolicy.apiServerNamespace }}
      {{- end }}
      ports:
      {{- range $port := $apiServer.ports }}
      - protocol: TCP
        port: {{ $port }}
      {{- end }}
    {{- if .Values.networkPolicy.egress.additionalRules }}
    {{- toYaml .Values.networkPolicy.egress.additionalRules | nindent 4 }}
    {{- end }}
{{- end }}
