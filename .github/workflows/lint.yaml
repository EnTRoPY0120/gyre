name: Lint and Type-Check

on:
  push:
    branches:
      - main
      - develop
    paths-ignore:
      - 'documentation/**'
      - '**.md'
  pull_request:
    branches:
      - main
      - develop
    paths-ignore:
      - 'documentation/**'
      - '**.md'
  workflow_dispatch:

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '25.8.1'

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.10

      - name: Get bun.lock file for caching
        id: bun-lock-hash
        run: |
          if [ -f bun.lock ]; then
            echo "hash=$(sha256sum bun.lock | awk '{print $1}')" >> $GITHUB_OUTPUT
            echo "lockfile_exists=true" >> $GITHUB_OUTPUT
          else
            echo "lockfile_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Cache Bun install
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ steps.bun-lock-hash.outputs.hash }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check formatting (oxfmt)
        run: bun run format:check

      - name: Run lint (oxlint)
        run: bun run lint

      - name: Run typecheck (SvelteKit)
        run: bun run check

      - name: Run build test
        run: bun run build
