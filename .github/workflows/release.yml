name: Create Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Get tag info
        id: tag
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          VERSION=${TAG_NAME#v}
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
        with:
          version: 'v3.20.1'

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package and push Helm chart to OCI
        run: |
          helm package charts/gyre --version ${{ steps.tag.outputs.version }} --app-version ${{ steps.tag.outputs.version }}
          helm push gyre-${{ steps.tag.outputs.version }}.tgz oci://ghcr.io/entropy0120/charts

      - name: Generate Release Notes
        id: notes
        run: |
          cat << 'EOF' > release_notes.md
          ## 🚀 Release ${{ steps.tag.outputs.tag_name }}

          ### 📦 Docker Images

          Pull the Docker image:
          ```bash
          docker pull ghcr.io/entropy0120/gyre:${{ steps.tag.outputs.version }}
          docker pull ghcr.io/entropy0120/gyre:latest
          docker pull ghcr.io/entropy0120/gyre:main
          ```

          ### ⎈ Kubernetes Installation

          **Using Helm:**
          ```bash
          helm install gyre oci://ghcr.io/entropy0120/charts/gyre \
            --version ${{ steps.tag.outputs.version }} \
            --namespace flux-system \
            --create-namespace
          ```

          For initial setup and credentials, see the [Installation Guide](https://entropy0120.github.io/gyre/installation).

          ### 📋 What's Included

          - **Docker image** (linux/amd64)
          - **Production-ready Helm chart**
          - **Comprehensive RBAC configuration**
          - **Auto-generated admin credentials**

          ### 📚 Documentation

          - [Installation Guide](https://entropy0120.github.io/gyre/getting-started)
          - [Helm Chart Documentation](https://entropy0120.github.io/gyre/installation)

          ### 🔗 Links

          - **Docker Image**: [ghcr.io/entropy0120/gyre](https://github.com/EnTRoPY0120/gyre/pkgs/container/gyre)
          - **Source Code**: [GitHub Repository](https://github.com/EnTRoPY0120/gyre)
          - **Issues**: [Report a bug](https://github.com/EnTRoPY0120/gyre/issues)
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          name: Release ${{ steps.tag.outputs.tag_name }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.tag_name, '-alpha') || contains(steps.tag.outputs.tag_name, '-beta') || contains(steps.tag.outputs.tag_name, '-rc') }}
          generate_release_notes: true

      - name: Release Summary
        run: |
          echo "### ✅ Release Created Successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.tag.outputs.tag_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Docker Image:** \`ghcr.io/entropy0120/gyre:${{ steps.tag.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Release URL:** https://github.com/${{ github.repository }}/releases/tag/${{ steps.tag.outputs.tag_name }}" >> $GITHUB_STEP_SUMMARY
